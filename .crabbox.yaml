profile: openclaw-check
# Default OpenClaw runner spend to the Azure-backed Crabbox account.
# Use `--provider aws` only for AWS-specific runner proof.
provider: azure
class: standard
capacity:
  market: spot
  strategy: most-available
  # Fail closed instead of silently falling back to on-demand while the
  # Azure-backed billing account is the default runner path.
  fallback: spot-only
  hints: true
actions:
  workflow: .github/workflows/crabbox-hydrate.yml
  # Default AWS hydration uses local Actions replay. Use
  # `crabbox actions hydrate --github-runner --job hydrate-github` when the
  # hydrate job needs GitHub secrets, or `--github-runner --job
  # hydrate-windows-daemon` for focused native Windows daemon proof.
  job: hydrate
  ref: main
  runnerLabels:
    - crabbox
    - openclaw
  runnerVersion: latest
  ephemeral: true
blacksmith:
  org: openclaw
  workflow: .github/workflows/ci-check-testbox.yml
  job: check
  ref: main
cache:
  pnpm: true
  npm: true
  git: true
  volumes:
    - name: pnpm
      key: openclaw-linux-node24-pnpm
      path: /var/cache/crabbox/pnpm
      sizeGB: 80
      required: false
    - name: npm
      key: openclaw-linux-node24-npm
      path: /var/cache/crabbox/npm
      sizeGB: 40
      required: false
aws:
  # AWS-specific overrides still pin direct `--provider aws` runs without
  # leaking AWS region names into the Azure default capacity fallback list.
  region: eu-west-1
  rootGB: 400
sync:
  delete: true
  checksum: false
  gitSeed: true
  fingerprint: true
  baseRef: main
  exclude:
    - .artifacts
    - .codex
    - .DS_Store
    - playwright-report
    - test-results
env:
  allow:
    - CI
    - NODE_OPTIONS
    - OPENCLAW_*
ssh:
  user: crabbox
  port: "2222"
jobs:
  prewarm:
    provider: azure
    target: linux
    class: standard
    market: spot
    idleTimeout: 90m
    hydrate:
      actions: true
      waitTimeout: 20m
    actions:
      workflow: .github/workflows/crabbox-hydrate.yml
      job: hydrate
      ref: main
    noSync: true
    shell: true
    command: "true"
    stop: never
  changed:
    provider: azure
    target: linux
    class: standard
    market: spot
    idleTimeout: 90m
    hydrate:
      actions: true
      waitTimeout: 20m
    actions:
      workflow: .github/workflows/crabbox-hydrate.yml
      job: hydrate
      ref: main
    command: env OPENCLAW_CHECK_CHANGED_REMOTE_CHILD=1 OPENCLAW_CHANGED_LANES_RAW_SYNC=1 CI=1 corepack pnpm check:changed
    stop: always
  testbox-changed:
    provider: blacksmith-testbox
    target: linux
    idleTimeout: 90m
    hydrate:
      actions: false
    actions:
      workflow: .github/workflows/ci-check-testbox.yml
      job: check
      ref: main
    command: env OPENCLAW_CHECK_CHANGED_REMOTE_CHILD=1 OPENCLAW_CHANGED_LANES_RAW_SYNC=1 CI=1 corepack pnpm check:changed
    stop: always
