            const result = spawnSync(
              "pnpm",
              [
                "exec",
                "node",
                ...resolveVitestNodeArgs(process.env),
                resolveVitestCliEntry(),
                "run",
                "--config",
                config,
              ],
              {
                env: childEnv,
                stdio: "inherit",
              },
